<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <link rel="stylesheet" href="resources/ol.css">
        <link rel="stylesheet" href="resources/ol-layerswitcher.css">
        <script src="resources/ol.js"></script>
        <script src="resources/proj4.js"></script>
        <script src="resources/ol-layerswitcher.js"></script>
        <script src="https://unpkg.com/flatgeobuf@3.24.0/dist/flatgeobuf-ol.min.js"></script>
        <style>
            html, body, #map { height: 100%; width: 100%; padding: 0; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
            
            /* Floating Panels */
            .top-panel {
                position: absolute;
                top: 10px;
                z-index: 1000;
                background: rgba(255, 255, 255, 0.95);
                padding: 10px 15px;
                border-radius: 4px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.15);
                border: 1px solid #ddd;
            }

            /* Title Box (Left) */
            #title-box {
                left: 10px;
                width: 260px;
            }
            #title-box h1 { margin: 0; font-size: 18px; color: #2c3e50; line-height: 1.2; }

            /* Abstract Box (Right - Stacked above layers) */
            #abstract-box {
                right: 10px;
                width: 250px; /* Matching typical layer switcher width */
            }
            #abstract-box p { 
                margin: 0; 
                font-size: 10.5px; 
                color: #444; 
                line-height: 1.3; 
            }
            #abstract-box .disclaimer { 
                display: block;
                margin-top: 4px; 
                font-style: italic; 
                font-size: 9.5px; 
                color: #d35400; 
            }

            /* UI Controls Positioning */
            /* Move Zoom below the Title Box */
            .ol-zoom { 
                top: 65px !important; 
                left: 10px !important; 
            }
            
            /* Move Layer Switcher below the Abstract Box */
            .layer-switcher { 
                top: 115px !important; 
                right: 10px !important; 
            }

            /* Attribute Popup */
            .ol-popup {
                position: absolute; background-color: white; padding: 15px; border-radius: 8px;
                border: 1px solid #ccc; bottom: 12px; left: -50px; min-width: 280px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            }
            .ol-popup:after { border-top-color: white; border-width: 10px; left: 48px; margin-left: -10px; top: 100%; border: solid transparent; content: " "; height: 0; width: 0; position: absolute; pointer-events: none; }
            .ol-popup-closer { text-decoration: none; position: absolute; top: 2px; right: 8px; color: #999; font-size: 18px; }
            .ol-popup-closer:after { content: "✖"; }
            
            table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
            td { padding: 5px; border-bottom: 1px solid #eee; }
            tr:nth-child(even) { background: #f9f9f9; }
        </style>
        <title>Global Transverse Drainages</title>
    </head>
    <body>
        <div id="title-box" class="top-panel">
            <h1>Global Transverse Drainages</h1>
        </div>

        <div id="abstract-box" class="top-panel">
            <p>This map displays endorheic and exorheic watersheds associated with transverse drainage systems. Click any feature to view drainage attributes.</p>
            <span class="disclaimer">Note: This map is a work in progress and subject to change.</span>
        </div>

        <div id="map"></div>

        <div id="popup" class="ol-popup">
            <a href="#" id="popup-closer" class="ol-popup-closer"></a>
            <div id="popup-content"></div>
        </div>

        <script>
        proj4.defs('EPSG:3857','+proj=merc +a=6378137 +b=6378137 +lat_ts=0 +lon_0=0 +x_0=0 +y_0=0 +k=1 +units=m +nadgrids=@null +wktext +no_defs');

        var container = document.getElementById('popup');
        var content = document.getElementById('popup-content');
        var closer = document.getElementById('popup-closer');
        var overlay = new ol.Overlay({ element: container, autoPan: true });
        closer.onclick = function() { overlay.setPosition(undefined); return false; };

        var esriTopo = new ol.layer.Tile({
            title: 'Esri World Topo',
            type: 'base',
            visible: true,
            source: new ol.source.XYZ({ url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', crossOrigin: 'anonymous' })
        });

        var openTopo = new ol.layer.Tile({
            title: 'OpenTopoMap',
            visible: true,
            opacity: 0.7,
            source: new ol.source.XYZ({ url: 'https://{a-c}.tile.opentopomap.org/{z}/{x}/{y}.png', crossOrigin: 'anonymous' })
        });

        var baseGroup = new ol.layer.Group({ title: 'Base Maps', layers: [esriTopo] });
        var overlayGroup = new ol.layer.Group({ title: 'Overlays', layers: [openTopo] });

        var map = new ol.Map({
            target: 'map',
            overlays: [overlay],
            layers: [baseGroup, overlayGroup],
            view: new ol.View({ center: [0, 0], zoom: 3 })
        });

        map.addControl(new ol.control.LayerSwitcher({ activationMode: 'click' }));
