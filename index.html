<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <link rel="stylesheet" href="resources/ol.css">
        <link rel="stylesheet" href="resources/ol-layerswitcher.css">
        <script src="resources/ol.js"></script>
        <script src="resources/proj4.js"></script>
        <script src="resources/ol-layerswitcher.js"></script>
        <script src="https://unpkg.com/flatgeobuf@3.24.0/dist/flatgeobuf-ol.min.js"></script>
        <style>
            html, body { height: 100%; width: 100%; padding: 0; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
            
            /* The New Header Bar */
            #header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                height: 70px;
                background-color: #ffffff;
                border-bottom: 2px solid #e74c3c;
                padding: 0 20px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
                position: relative;
                z-index: 1001;
            }

            #header h1 { margin: 0; font-size: 22px; color: #2c3e50; white-space: nowrap; }
            
            #abstract-area { text-align: right; max-width: 50%; }
            #abstract-area p { margin: 0; font-size: 13px; color: #444; line-height: 1.3; }
            #abstract-area .disclaimer { display: block; font-style: italic; font-size: 11px; color: #e67e22; margin-top: 3px; }

            /* Map takes up the remaining space below header */
            #map { 
                position: absolute;
                top: 72px; /* Starts exactly where header ends */
                bottom: 0;
                width: 100%;
            }

            /* Adjust controls to stay clear of header */
            .ol-zoom { top: 15px; }
            .layer-switcher { top: 15px; }

            .ol-popup {
                position: absolute; background-color: white; padding: 15px; border-radius: 8px;
                border: 1px solid #ccc; bottom: 12px; left: -50px; min-width: 260px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            }
            .ol-popup:after { border-top-color: white; border-width: 10px; left: 48px; margin-left: -10px; top: 100%; border: solid transparent; content: " "; height: 0; width: 0; position: absolute; pointer-events: none; }
            .ol-popup-closer { text-decoration: none; position: absolute; top: 2px; right: 8px; color: #999; font-size: 18px; }
            .ol-popup-closer:after { content: "✖"; }
            
            table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
            td { padding: 6px; border-bottom: 1px solid #eee; }
            tr:nth-child(even) { background: #f9f9f9; }
        </style>
        <title>Global Transverse Drainages</title>
    </head>
    <body>
        <div id="header">
            <h1>Global Transverse Drainages</h1>
            <div id="abstract-area">
                <p>This map displays endorheic and exorheic watersheds associated with transverse drainage systems. Click any feature to view drainage attributes.</p>
                <span class="disclaimer">Note: This map is a work in progress and subject to change.</span>
            </div>
        </div>

        <div id="map"></div>

        <div id="popup" class="ol-popup">
            <a href="#" id="popup-closer" class="ol-popup-closer"></a>
            <div id="popup-content"></div>
        </div>

        <script>
        proj4.defs('EPSG:3857','+proj=merc +a=6378137 +b=6378137 +lat_ts=0 +lon_0=0 +x_0=0 +y_0=0 +k=1 +units=m +nadgrids=@null +wktext +no_defs');

        var container = document.getElementById('popup');
        var content = document.getElementById('popup-content');
        var closer = document.getElementById('popup-closer');
        var overlay = new ol.Overlay({ element: container, autoPan: true });
        closer.onclick = function() { overlay.setPosition(undefined); return false; };

        var esriTopo = new ol.layer.Tile({
            title: 'Esri World Topo',
            type: 'base',
            visible: true,
            source: new ol.source.XYZ({ url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', crossOrigin: 'anonymous' })
        });

        var openTopo = new ol.layer.Tile({
            title: 'OpenTopoMap',
            visible: true,
            opacity: 0.7,
            source: new ol.source.XYZ({ url: 'https://{a-c}.tile.opentopomap.org/{z}/{x}/{y}.png', crossOrigin: 'anonymous' })
        });

        var baseGroup = new ol.layer.Group({ title: 'Base Maps', layers: [esriTopo] });
        var overlayGroup = new ol.layer.Group({ title: 'Overlays', layers: [openTopo] });

        var map = new ol.Map({
            target: 'map',
            overlays: [overlay],
            layers: [baseGroup, overlayGroup],
            view: new ol.View({ center: [0, 0], zoom: 3 })
        });

        map.addControl(new ol.control.LayerSwitcher({ activationMode: 'click' }));

        async function loadR2Layer(fileName, color, width, layerTitle, zIndex = 0, radius = 5, strokeColor = 'white') {
            const url = "https://pub-cd860c4a373e4093b459558baa5eb15f.r2.dev/" + encodeURIComponent(fileName);
            const source = new ol.source.Vector({
                loader: async function(extent, resolution, projection) {
                    const response = await fetch(url);
                    for await (const feature of flatgeobuf.deserialize(response.body, undefined)) {
                        feature.getGeometry().transform('EPSG:4326', projection);
                        this.addFeature(feature);
                    }
                }
            });
            const vectorLayer = new ol.layer.Vector({
                title: layerTitle,
                source: source,
                zIndex: zIndex,
                style: new ol.style.Style({
                    stroke: new ol.style.Stroke({ color: color, width: width }),
                    image: new ol.style.Circle({
                        radius: radius,
                        fill: new ol.style.Fill({ color: color }),
                        stroke: new ol.style.Stroke({color: strokeColor, width: 1.5})
                    })
                })
            });
            overlayGroup.getLayers().push(vectorLayer);
        }

        // Layer Configuration
        loadR2Layer('TD watersheds endorheic streams.fgb', '#ff7f00', 2.5, 'Endorheic Watersheds', 1);
        loadR2Layer('TD watersheds exorheic streams.fgb', '#0070ff', 2.5, 'Exorheic Watersheds', 2);
        loadR2Layer('TD reach.fgb', '#ff0000', 3, 'TD Reach', 10);
        loadR2Layer('points upstream of pp.fgb', '#ffffff', 2, 'Upstream Points', 20, 5, '#000000');
        loadR2Layer('points downstream of pp.fgb', '#6a3d9a', 2, 'Downstream Points', 20, 5);
        loadR2Layer('pour points into the td.fgb', '#ff0000', 2, 'Pour Points', 30, 7.5);

        map.on('singleclick', function(evt) {
            var feature = map.forEachFeatureAtPixel(evt.pixel, function(feat) { return feat; });
            if (feature) {
                var props = feature.getProperties();
                var info = '<table>';
                for (var key in props) {
                    if (key !== 'geometry' && key !== 'id') { 
                        info += '<tr><td><b>' + key + '</b></td><td>' + props[key] + '</td></tr>'; 
                    }
                }
                info += '</table>';
                content.innerHTML = info;
                overlay.setPosition(evt.coordinate);
            } else { overlay.setPosition(undefined); }
        });

        map.on('pointermove', function(e) {
            if (e.dragging) return;
            var pixel = map.getEventPixel(e.originalEvent);
            var hit = map.hasFeatureAtPixel(pixel);
            map.getTargetElement().style.cursor = hit ? 'pointer' : '';
        });
        </script>
    </body>
</html>
