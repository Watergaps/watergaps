<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        
        <link rel="stylesheet" href="resources/ol.css">
        <link rel="stylesheet" href="resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="resources/qgis2web.css">
        
        <script src="https://unpkg.com/flatgeobuf@3.24.0/dist/flatgeobuf-ol.min.js"></script>

        <style>
        html, body, #map { 
            width: 100%; 
            height: 100%; 
            padding: 0; 
            margin: 0; 
            background-color: #ffffff; 
        }
        </style>
        <title>Global transverse drainages (TDs)</title>
    </head>
    <body>
        <div id="map"></div>
        
        <script src="resources/ol.js"></script>
        <script src="resources/proj4.js"></script>
        <script>
            proj4.defs('EPSG:3857','+proj=merc +a=6378137 +b=6378137 +lat_ts=0 +lon_0=0 +x_0=0 +y_0=0 +k=1 +units=m +nadgrids=@null +wktext +no_defs');
        </script>

        <script>
        // 1. Initialize the Map manually (Bypassing the broken qgis2web.js)
        var map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({
                    source: new ol.source.OSM() // Adds a basic base map
                })
            ],
            view: new ol.View({
                center: [0, 0],
                zoom: 2
            })
        });

        // 2. The function to pull data from your R2 storage
        async function loadR2Layer(fileName) {
            const url = "https://pub-cd860c4a373e4093b459558baa5eb15f.r2.dev/" + encodeURIComponent(fileName);
            
            const source = new ol.source.Vector({
                loader: async function(extent, resolution, projection) {
                    try {
                        const response = await fetch(url);
                        for await (const feature of flatgeobuf.deserialize(response.body, undefined)) {
                            // Convert the coordinates to match the map
                            feature.getGeometry().transform('EPSG:4326', projection);
                            this.addFeature(feature);
                        }
                    } catch (err) {
                        console.error("Error loading " + fileName, err);
                    }
                }
            });

            const vectorLayer = new ol.layer.Vector({
                source: source
            });

            map.addLayer(vectorLayer);
        }

        // 3. Load your 6 files
        loadR2Layer('TD reach.fgb');
        loadR2Layer('TD watersheds endorheic streams.fgb');
        loadR2Layer('TD watersheds exorheic streams.fgb');
        loadR2Layer('points downstream of pp.fgb');
        loadR2Layer('points upstream of pp.fgb');
        loadR2Layer('pour points into the td.fgb');
        </script>
    </body>
</html>
