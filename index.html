<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        
        <link rel="stylesheet" href="resources/ol.css">
        <link rel="stylesheet" href="resources/ol-layerswitcher.css">
        
        <script src="resources/ol.js"></script>
        <script src="resources/proj4.js"></script>
        <script src="resources/ol-layerswitcher.js"></script>
        <script src="https://unpkg.com/flatgeobuf@3.24.0/dist/flatgeobuf-ol.min.js"></script>

        <style>
        html, body, #map { width: 100%; height: 100%; padding: 0; margin: 0; background-color: #ffffff; }
        /* Positioning the layer switcher button */
        .layer-switcher { top: 0.5em; right: 0.5em; }
        </style>
        <title>Global transverse drainages (TDs)</title>
    </head>
    <body>
        <div id="map"></div>

        <script>
        proj4.defs('EPSG:3857','+proj=merc +a=6378137 +b=6378137 +lat_ts=0 +lon_0=0 +x_0=0 +y_0=0 +k=1 +units=m +nadgrids=@null +wktext +no_defs');
        
        // 1. DEFINE BASE LAYERS
        var openTopo = new ol.layer.Tile({
            title: 'OpenTopoMap',
            type: 'base',
            visible: true,
            source: new ol.source.XYZ({
                url: 'https://{a-c}.tile.opentopomap.org/{z}/{x}/{y}.png',
                attributions: 'Map data: &copy; OpenStreetMap contributors, SRTM | Map style: &copy; OpenTopoMap (CC-BY-SA)'
            })
        });

        var mapzenTerrain = new ol.layer.Tile({
            title: 'Mapzen Terrain',
            type: 'base',
            visible: false,
            source: new ol.source.XYZ({
                url: 'https://s3.amazonaws.com/elevation-tiles-prod/hillshade/{z}/{x}/{y}.png',
                attributions: 'Terrain: Mapzen, AWS'
            })
        });

        var osm = new ol.layer.Tile({
            title: 'OSM Standard',
            type: 'base',
            visible: false,
            source: new ol.source.OSM()
        });

        // 2. INITIALIZE MAP WITH BASE GROUPS
        var map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Group({
                    title: 'Base Maps',
                    layers: [osm, mapzenTerrain, openTopo]
                })
            ],
            view: new ol.View({
                center: [0, 0],
                zoom: 2
            })
        });

        // Add the switcher tool to the map
        var layerSwitcher = new ol.control.LayerSwitcher({
            activationMode: 'click',
            tipLabel: 'Layers',
            groupSelectStyle: 'children'
        });
        map.addControl(layerSwitcher);

        // 3. YOUR VECTOR LOADING FUNCTION (KEPT THE SAME)
        async function loadR2Layer(fileName, color) {
            const url = "https://pub-cd860c4a373e4093b459558baa5eb15f.r2.dev/" + encodeURIComponent(fileName);
            const source = new ol.source.Vector({
                loader: async function(extent, resolution, projection) {
                    try {
                        const response = await fetch(url);
                        for await (const feature of flatgeobuf.deserialize(response.body, undefined)) {
                            feature.getGeometry().transform('EPSG:4326', projection);
                            this.addFeature(feature);
                        }
                    } catch (err) { console.error("Error loading " + fileName, err); }
                }
            });

            const vectorLayer = new ol.layer.Vector({
                source: source,
                style: new ol.style.Style({
                    stroke: new ol.style.Stroke({ color: color, width: 2 }),
                    image: new ol.style.Circle({
                        radius: 5,
                        fill: new ol.style.Fill({ color: color })
                    })
                })
            });
            map.addLayer(vectorLayer);
        }

        // Load your data
        loadR2Layer('TD reach.fgb', 'blue');
        loadR2Layer('TD watersheds endorheic streams.fgb', 'green');
        loadR2Layer('TD watersheds exorheic streams.fgb', 'orange');
        loadR2Layer('points downstream of pp.fgb', 'red');
        loadR2Layer('points upstream of pp.fgb', 'purple');
        loadR2Layer('pour points into the td.fgb', 'black');
        </script>
    </body>
</html>
